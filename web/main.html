<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Group Presentation</title>
  <style>
    body {
      background: #fff;
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 2.2rem;
      color: #222;
      margin-bottom: 3rem;
      letter-spacing: 2px;
      text-align: center;
    }

    .button-group {
      display: flex;
      gap: 2rem;
    }

    .blur-btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.8);
      color: #111;
      border: none;
      border-radius: 14px;
      padding: 1.2rem 2.8rem;
      box-shadow: 0 4px 32px 0 rgba(180,180,180,0.18);
      filter: blur(0.7px);
      backdrop-filter: blur(7px);
      cursor: pointer;
      transition: filter 0.2s, box-shadow 0.2s;
    }

    .blur-btn:hover, .blur-btn:focus {
      filter: blur(0);
      box-shadow: 0 6px 48px 0 rgba(180,180,180,0.28);
      background: #f6f6f6;
      outline: none;
    }
  </style>
</head>
<body>
  <h1>¡CONOCE A NUESTRO GRUPO!</h1>
  <div class="button-group">
    <button class="blur-btn">SOFIA MORENO</button>
    <button class="blur-btn">SOFIA A</button>
  </div>
</body>
</html>
